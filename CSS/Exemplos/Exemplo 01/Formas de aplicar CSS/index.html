<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de aplicar CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Formas de aplicar CSS</h1>

    <!-- Inline (na própria tag HTML) -->
     <p style="color: blue;">Texto azul</p>

    <!-- Interno (no head HTML) -->
      <style>
            p {
                color: green;
            }
      </style>

      <!-- Externo (arquivo separado) -->
        <p class="texto">Forma mais recomendada para projetos reais</p>
</body>
</html>
