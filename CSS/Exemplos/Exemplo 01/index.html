<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello World</title>
    <style>
        body {
            /* Ativar o flexbox para o alinhamento, ou seja, ficar alinhado ao lado. */
            display: flex;
            
            /* Centraliza horizontalmente o conteúdo. */
            justify-content: center;

            /* Centraliza verticalmente o conteúdo.  */
            align-items: center;

            /* Define altura com 100% da altura da tela. */
            height: 100vh;

            /* Cor de fundo cinza claro. */
            background-color: rgb(105, 105, 105);

            /* Define a fonte do texto. */
            font-family: Arial, Helvetica, sans-serif;
         }
         /* Estilos aplicados ao titulo (h1). */
         h1 {

            /* cor do texto. */
            color: brown;

            /* Tamanho da fonte "REM" (3 vezes o tamanho padrão 16px). */
            font-size: 3rem;

            /* Barra/contorno ao redor do texto. */
            border: 10px solid red;

            /* Espaçamento interno (topo/baixo = 15px, lados = 20px). */
            padding: 15px 20px;

            /* Arredondamento interno da borda.  */
            border-radius: 40%;

            /* Fundo branco para destacar o texto. */
            background-color: #FFF;
         }
    </style>
</head>
<body>
    <!-- texto exibido no navegador.  -->l
    <h1>Coca Cola</h1>
</body>
</html>
