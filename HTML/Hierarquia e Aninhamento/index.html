<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarquia e Aninhamento</title>
</head>
<body>
    <h1>Hierarquia e Aninhamento</h1>
    <p>HTML deve ser bem estruturado, as tags precisam ser aninhadas corretamente:</p>

    <!-- CORRETO ✅ -->
        <p><strong>texto importante </strong> dentro de um parágrafo</p>

    <!-- ERRADO ❌ -->
        <P><strong>Texto importante</P></strong>
</body>
</html>
