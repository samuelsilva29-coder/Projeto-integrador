<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de mídia</title>
</head>
<body>
        <h1>Elementos de Mídia</h1>
        <p>Elementos de mídia permitem incorporar imagens, áudio e vídeos diretamente em páginas web.</p>

        <h2>Imagem</h2>
        <!--Incorpora imagens-->

        <!-- Imagens por meio do link -->
        <img src="https://i.pinimg.com/736x/87/79/77/87797713aa566a236547b5f6f0063257.jpg" alt="" >
        <h2>Links</h2>
        <a href="contato.html" target="_blank">Entre em contato</a>

        <!--target="blank" = abre uma nova aba -->
        <!--title="texto" = dica flutuante-->
        <!-- href="#topo" = link para uma âncora na mesma página-->
         <h2>Audio e video</h2>
         <audio  controls>
            <source src="musica.mp3" type="audio/mpeg">
         </audio>

         <video controls>
            <source src="video.mp4" type="video/mp4">
         </video>

         <!--controls: mostra os botões de play, pause e volume-->
         <!--source: define o arquivo de áudio-->
         <!--type: indica que é um áudio ou vídeo-->
</body>
</html>
