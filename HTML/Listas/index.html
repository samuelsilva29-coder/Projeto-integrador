<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Listas Ordenadas e Não Ordenadas</h1>
    <p>Os elementos de lista HTML organizam conteúdos usando tags específicas </p>

    <h2>Listas Não Ordenadas (unordered Lista)</h2>
    <!-- Cria uma lista não ordenada, geralmente exibida com marcadores (bolinhas/círculos)-->

    <ul> <!-- Unordered Listas-->
        <li>Maçã</li> <!-- Item de Lista-->
        <li>Abacaxi</li> <!-- Item de Lista-->
        <li>Uva</li> <!-- Item de Lista-->
        <li>Pitáia</li> <!-- Item de Lista-->
    </ul>

    <h2>Listas Ordenadas (Ordened List)</h2>
    <!-- Cria uma lista ordenada, tipicamente
     numerada ou alfabética (1,2,3; a,b,c; )-->

     <ol> <!-- Ordered List-->
        <li>Flamengo</li> <!-- Item de lista-->
        <li>São Paulo</li> <!--Item de Lista -->
        <li>Santos</li> <!-- Item de lista-->
        <li>Palmeiras</li> <!-- Item da lista-->
        <li>Corinthians</li> <!-- Item da lista-->

     </ol>
</body>
</html>
