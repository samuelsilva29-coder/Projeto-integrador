<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Agrupamento Genéricos</title>
</head>
<body>
    <h1>Elementos de Agrupamento Genéricos</h1>

    <p>Os elementos de agrupamento em HTML são usados para organizar
        o conteúdo da página sem necessariamente adicionar
        significado semântico forte, mas são essencias para estrutura,
        layout e estilização com CSS ou manipulação com JS.
    </p>

    <div>
        <!-- Agrupa elementos de bloco -->
    </div>
    
    <div>
        <h2>Título</h2>
        <p>Texto</p>
    </div>

    <span>
        <!-- Agrupa elementos de linha (inline)-->
    </span>

    <p>Projeto <span style="color: red;">Integrador</span></p>

</body>
</html>
