<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Formulário</title>
</head>
<body>
    <h1>Elementos de Formulário</h1>
    <p>Os elementos de formulário em HTML permitem coletar dados do usuário (como login
        cadastro, pesquisa, etc.)
    </p>

    <form action="" method="">
        <fieldset>
            <legend>Contato</legend>
        </fieldset>
            <label for="nome">Nome:</label>
            <input id="nome" name="nome" type="text" required; style=" background-color: rgb(199, 199, 199);"><br>

            <label for="email">Email:</label>
            <input id="email" name="email" type="email" required style="background-color: rgb(199, 199, 199)"><br>

            <label for="senha">Senha:</label>
            <input id="senha" name="senha" type="password" required; style=" background-color: rgb(199,199, 199);"><br>

            <button type="submit">Enviar</button>
        </fieldset>
    </form>

    <!--form: Inicio e fim do formulário-->
    <!--input: campo de entrada (texto, número, email, senha e etc.)-->
    <!--textarea: campo de texto longo-->
    <!--label: Texto descritivo de campo-->
    <!--select/option: menu suspenso-->
    <!--fieldset/legend: agrupamento lógico-->
    <!--button: botão de ação-->
</body>
</html>
